id: com.nomm.Nomm
runtime: org.gnome.Platform
runtime-version: '49' # Matching the latest stable GNOME runtime
sdk: org.gnome.Sdk
command: nomm # The name of your entry-point script
finish-args:
  # Network access for downloading images and Nexus mods
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --own-name=com.nomm.Nomm
  # Heroic
  - --filesystem=~/.config/heroic:ro # Standard
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl/config/heroic:ro # Flatpak
  # Steam
  - --filesystem=~/.local/share/Steam:ro # Standard
  - --filesystem=~/.var/app/com.valvesoftware.Steam:ro # Flatpak
  # Mounting points (to install mods in games)
  - --filesystem=/run/media:rw
  - --filesystem=/mnt:rw
  #to allow to read and write files from home folder
  - --filesystem=home

modules:
  # 1. Python dependencies (generated via flatpak-pip-generator)
  - python3-modules.json

  # bundling unrar because otherwise the default version in flatpak doesn't work
  - name: unrar
    buildsystem: simple
    build-commands:
      - make -f makefile
      - install -Dm755 unrar /app/bin/unrar
    sources:
      - type: archive
        url: https://www.rarlab.com/rar/unrarsrc-6.2.10.tar.gz
        sha256: 55fe6ebd5e48d6655bfda3fd19b55438ca05e13c7e69772420caad9fdb68ef42
  
  # bundling p7zip because I'm an idiot who couldn't make py7zr to work
  - name: p7zip
    buildsystem: simple
    build-commands:
      # '7za' is the standalone binary with the main codecs built-in
      - make 7za
      # We install it as '7z' so your Python code doesn't have to change
      - install -Dm755 bin/7za /app/bin/7z
    sources:
      - type: archive
        url: https://github.com/p7zip-project/p7zip/archive/refs/tags/v17.05.tar.gz
        sha256: d2788f892571058c08d27095c22154579dfefb807ebe357d145ab2ddddefb1a6

  # 2. Your Application
  - name: Yamm
    buildsystem: simple

    build-commands:
      # Install entry point from the src folder to /app/bin
      - install -D src/main.py /app/bin/yamm
      
      # Autres fichiers racines de src
      - cp src/*.yaml /app/bin/
      
      # Install desktop file
      - install -D com.Emetros.Yamm.desktop /app/share/applications/com.Emetros.Yamm.desktop

      # Install metainfo
      - install -D com.Emetros.Yamm.metainfo.xml /app/share/metainfo/com.Emetros.Yamm.metainfo.xml

      # Install icon
      - install -D assets/nomm.png /app/share/icons/hicolor/64x64/apps/com.Emetros.Yamm.png

      # Copy all other python files FROM src into the same /app/bin folder
      # This ensures 'nomm' and 'dashboard.py' are flat neighbors
      - cp -r src/core /app/bin/core
      - cp -r src/gui /app/bin/gui
      - cp -r src/styles /app/bin/styles

      - cp src/*.yaml /app/bin/
      
      # Copy non-code folders
      - cp -r assets /app/bin/assets
      - cp -r default_game_configs /app/bin/default_game_configs

      # Localisation
      - mkdir -p /app/share/locale/fr/LC_MESSAGES
      - msgfmt locale/fr.po -o /app/share/locale/fr/LC_MESSAGES/com.Emetros.Yamm.mo

    sources:
      - type: dir
        path: .